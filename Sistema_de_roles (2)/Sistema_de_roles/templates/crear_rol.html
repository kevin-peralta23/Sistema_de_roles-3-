<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Rol</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-96">

    <h2 class="text-2xl font-bold text-center mb-6">Crear nuevo rol</h2>

    <!-- Mostrar error si el backend lo envía -->
    {% if error %}
    <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" autocomplete="off">

        <!-- Campo seguro para nombre del rol -->
        <input 
            type="text" 
            name="rol" 
            placeholder="Nombre del rol"
            class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"
            required
            minlength="3"
            maxlength="30"
            pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+"
            title="Solo letras y espacios, mínimo 3 caracteres">

        <!-- Botón seguro -->
        <button 
            type="submit"
            class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 active:scale-95 transition">
            Guardar rol
        </button>

    </form>

    <!-- Botón regresar corregido -->
    <a href="/admin" 
       class="block text-center w-full mt-3 bg-gray-500 text-white p-2 rounded-lg hover:bg-gray-600">
        Volver
    </a>

</div>

</body>
</html>
